spring:
  application:
    name: mutsa-delivery

  profiles:
    default: local

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "https://mutsa.dev.me.kr/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope:
              - profile_nickname
#              - account_email

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id # 카카오 유저 PK 키값 (JSON 최상단의 id)

# JWT 설정 — secret은 반드시 환경변수(JWT_SECRET)로 주입한다. (코드/저장소에 평문 작성 금지)
# local·test 프로필에서만 개발용 기본값으로 대체된다.
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000  # Access Token 만료: 1시간

app:
  cors:
    allowed-origins: http://localhost:5173
  oauth2:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
