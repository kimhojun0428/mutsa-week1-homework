spring:
  application:
    name: mutsa-delivery

  profiles:
    default: local

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# JWT 설정 — secret은 반드시 환경변수(JWT_SECRET)로 주입한다. (코드/저장소에 평문 작성 금지)
# local·test 프로필에서만 개발용 기본값으로 대체된다.
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000  # Access Token 만료: 1시간

app:
  cors:
    allowed-origins: http://localhost:5173
