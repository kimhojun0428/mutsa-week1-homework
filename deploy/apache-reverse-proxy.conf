<VirtualHost *:80>
    ServerName api.example.com
    Redirect permanent / https://api.example.com/
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName api.example.com

    ErrorLog ${APACHE_LOG_DIR}/spring-app_error.log
    CustomLog ${APACHE_LOG_DIR}/spring-app_access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/api.example.com/cert.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.example.com/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/api.example.com/chain.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
</VirtualHost>
</IfModule>
