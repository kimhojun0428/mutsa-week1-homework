<VirtualHost *:80>
    ServerName mutsa.dev.me.kr
    Redirect permanent / https://mutsa.dev.me.kr/
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName mutsa.dev.me.kr

    ErrorLog ${APACHE_LOG_DIR}/mutsa_error.log
    CustomLog ${APACHE_LOG_DIR}/mutsa_access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/dev.me.kr/cert.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/dev.me.kr/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/dev.me.kr/chain.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
</VirtualHost>
</IfModule>
